name = "syntoniqa-mrs-api"
main = "cloudflare_worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
# Cron ogni 15 minuti: controlla interventi e manda notifiche reminder
crons = ["*/15 * * * *"]

[ai]
binding = "AI"

# KV Namespace per rate limiter persistente (sopravvive ai cold-start)
# Creare in CF Dashboard → KV → "RATE_KV" → copiare l'ID qui
[[kv_namespaces]]
binding = "RATE_KV"
id = "9b7d282372684320b4e9d328f13c96e6"

[vars]
# Brand white-label (NON sono secrets — testo pubblico)
BRAND_NAME = "MRS Lely Center Emilia Romagna"
BRAND_SHORT = "MRS Lely Center"
BRAND_EMAIL = "noreply@syntoniqa.app"
BRAND_EMAIL_FROM = "MRS Lely Center <noreply@syntoniqa.app>"
BRAND_ADMIN_URL = "https://fieldforcemrser2026.github.io/syntoniqa/admin_v1.html"
BRAND_TECH_URL = "https://fieldforcemrser2026.github.io/syntoniqa/index_v2.html"
BRAND_COLOR = "#C30A14"
CORS_EXTRA = "https://lssa2.lelyonline.com"

# Secrets (NON mettere valori reali qui — usa wrangler secret put NOME_SECRET)
# SUPABASE_URL, SUPABASE_SERVICE_KEY, SQ_TOKEN, TELEGRAM_BOT_TOKEN,
# TELEGRAM_WEBHOOK_SECRET, RESEND_API_KEY, JWT_SECRET
# AI Provider keys (tutte opzionali — il sistema usa quelli configurati in ordine di ranking):
# GEMINI_KEY, GROQ_KEY, CEREBRAS_KEY, MISTRAL_KEY, DEEPSEEK_KEY
